<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: 13px;
      background: #fff;
      color: #111827;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px 8px;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .header-icon { font-size: 14px; }
    .header-title { font-size: 12px; font-weight: 600; color: #374151; flex: 1; }
    .header-link { font-size: 11px; color: #6366f1; text-decoration: none; }
    .header-link:hover { text-decoration: underline; }

    .content { flex: 1; padding: 10px 14px 12px; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #9ca3af;
      text-align: center;
    }
    .empty .icon { font-size: 1.8rem; }
    .empty p { font-size: 12px; }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-row.first {
      background: #fefce8;
      margin: 0 -14px;
      padding: 8px 14px;
      border-radius: 6px;
      border-bottom: none;
    }

    .rank-label { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
    .member-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .member-name { flex: 1; font-weight: 500; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .member-rating { font-size: 12px; font-weight: 600; color: #6366f1; }
    .member-games { font-size: 10px; color: #9ca3af; margin-left: 4px; }

    .no-composite { font-size: 11px; color: #9ca3af; font-style: italic; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-icon">🏆</span>
  <span class="header-title">Leaderboard</span>
  <a class="header-link" href="/run/leaderboard">Open</a>
</div>

<div class="content" id="content">
  <div class="empty">
    <span class="icon">🏆</span>
    <p>No matches recorded yet</p>
  </div>
</div>

<script type="module">
import { esc, memberColor, initial } from "/hub-sdk.js";
import { compositeRating, buildOverallRankings, rankLabel, formatRating } from "./logic.js";

const CONTEXT = window.__CONTEXT_URL ?? "";
const DB      = window.__DB_URL      ?? "";

async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  return res.json();
}

async function init() {
  let members = [];
  if (CONTEXT) {
    try {
      const res = await fetch(`${CONTEXT}?keys=family.members`);
      members = ((await res.json())["family.members"]) ?? [];
    } catch {}
  }

  const { rows: ratingRows } = await db(
    `SELECT member_id, category_id, rating, games_played FROM lb_ratings`
  );
  if (!ratingRows.length) return;

  const ratingsByMember = new Map();
  for (const r of ratingRows) {
    if (!ratingsByMember.has(r.member_id)) ratingsByMember.set(r.member_id, []);
    ratingsByMember.get(r.member_id).push({ categoryId: r.category_id, rating: r.rating, gamesPlayed: r.games_played });
  }

  const ranked = buildOverallRankings(members, ratingsByMember).filter(r => r.totalGames > 0).slice(0, 4);
  if (!ranked.length) return;

  const content = document.getElementById("content");
  content.innerHTML = ranked.map(({ member, composite, totalGames }, i) => {
    const color = memberColor(member.id, members);
    const label = rankLabel(i);
    const rating = composite != null ? formatRating(composite) : null;
    return `
      <div class="rank-row${i === 0 ? " first" : ""}">
        <span class="rank-label">${label}</span>
        <span class="member-avatar" style="background:${color}">${esc(initial(member.name))}</span>
        <span class="member-name">${esc(member.name)}</span>
        ${rating
          ? `<span class="member-rating">${rating}</span><span class="member-games">${totalGames}g</span>`
          : `<span class="no-composite">${totalGames} game${totalGames === 1 ? "" : "s"}</span>`
        }
      </div>
    `;
  }).join("");
}

init();
</script>
</body>
</html>
